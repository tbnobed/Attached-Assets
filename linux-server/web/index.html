<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZoomLink SDI Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 20px 30px;
      border-bottom: 2px solid #0ea5e9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 24px; color: #fff; }
    .header .subtitle { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block; margin-right: 8px;
    }
    .status-dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .status-dot.red { background: #ef4444; box-shadow: 0 0 8px #ef444488; }
    .status-dot.yellow { background: #eab308; box-shadow: 0 0 8px #eab30888; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card {
      background: #16213e;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 16px;
      color: #0ea5e9;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .count {
      background: #0ea5e9;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .empty-state {
      color: #64748b;
      font-size: 14px;
      text-align: center;
      padding: 30px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; font-size: 13px; }
    th { color: #94a3b8; border-bottom: 1px solid #1e3a5f; font-weight: 500; }
    td { border-bottom: 1px solid #1e3a5f22; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.active { background: #22c55e22; color: #22c55e; }
    .badge.idle { background: #eab30822; color: #eab308; }
    .badge.offline { background: #ef444422; color: #ef4444; }
    .btn {
      background: #0ea5e9;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #0284c7; }
    .btn.danger { background: #ef4444; }
    .btn.danger:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    select {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #1e3a5f;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: #1a1a2e;
      padding: 12px 16px;
      border-radius: 8px;
      flex: 1;
      min-width: 120px;
    }
    .stat-item .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-item .value { font-size: 20px; font-weight: 700; color: #fff; margin-top: 4px; }
    .full-width { grid-column: 1 / -1; }
    .assign-row { display: flex; align-items: center; gap: 8px; }
    .uptime { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>ZoomLink SDI Server</h1>
      <div class="subtitle">Linux DeckLink Output Controller</div>
    </div>
    <div class="uptime">
      <span class="status-dot" id="serverStatus"></span>
      <span id="uptimeText">Connecting...</span>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Server Stats</h2>
        <div class="stats-row">
          <div class="stat-item">
            <div class="label">Clients</div>
            <div class="value" id="clientCount">0</div>
          </div>
          <div class="stat-item">
            <div class="label">Participants</div>
            <div class="value" id="participantCount">0</div>
          </div>
          <div class="stat-item">
            <div class="label">DeckLink Devices</div>
            <div class="value" id="deviceCount">0</div>
          </div>
          <div class="stat-item">
            <div class="label">Active Outputs</div>
            <div class="value" id="outputCount">0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Connected Clients <span class="count" id="clientBadge">0</span></h2>
        <div id="clientList"><div class="empty-state">No clients connected</div></div>
      </div>

      <div class="card full-width">
        <h2>DeckLink Devices <span class="count" id="deviceBadge">0</span></h2>
        <div id="deviceList"><div class="empty-state">No DeckLink devices detected</div></div>
      </div>

      <div class="card full-width">
        <h2>Participants <span class="count" id="participantBadge">0</span></h2>
        <div id="participantList"><div class="empty-state">No participants in meeting</div></div>
      </div>
    </div>
  </div>

  <script>
    let lastData = null;
    let deviceInfo = null;

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        lastData = await res.json();
        updateUI(lastData);
        document.getElementById('serverStatus').className = 'status-dot green';
      } catch (err) {
        document.getElementById('serverStatus').className = 'status-dot red';
        document.getElementById('uptimeText').textContent = 'Connection lost';
      }
    }

    async function fetchDevices() {
      try {
        const res = await fetch('/api/devices');
        deviceInfo = await res.json();
      } catch (err) {}
    }

    function updateUI(data) {
      const uptime = Math.floor(data.server.uptime);
      const h = Math.floor(uptime / 3600);
      const m = Math.floor((uptime % 3600) / 60);
      const s = uptime % 60;
      document.getElementById('uptimeText').textContent = `Uptime: ${h}h ${m}m ${s}s`;

      const rx = data.receiver || {};
      const dl = data.decklink || {};

      document.getElementById('clientCount').textContent = rx.clientCount || 0;
      document.getElementById('participantCount').textContent = rx.participantCount || 0;
      document.getElementById('deviceCount').textContent = dl.deviceCount || 0;
      document.getElementById('outputCount').textContent = Object.keys(dl.outputs || {}).length;

      document.getElementById('clientBadge').textContent = rx.clientCount || 0;
      document.getElementById('deviceBadge').textContent = dl.deviceCount || 0;
      document.getElementById('participantBadge').textContent = rx.participantCount || 0;

      renderClients(rx.clients || []);
      renderDevices(dl.devices || [], dl.outputs || {});
      renderParticipants(rx.participants || {}, dl);
    }

    function renderClients(clients) {
      const el = document.getElementById('clientList');
      if (clients.length === 0) {
        el.innerHTML = '<div class="empty-state">No clients connected</div>';
        return;
      }
      let html = '<table><tr><th>ID</th><th>Address</th><th>Packets</th><th>Data</th><th>Connected</th></tr>';
      for (const c of clients) {
        const ago = Math.floor((Date.now() - c.connectedAt) / 1000);
        const mb = (c.bytesReceived / 1048576).toFixed(1);
        html += `<tr><td>${c.id}</td><td>${c.remoteAddr}</td><td>${c.packetsReceived.toLocaleString()}</td><td>${mb} MB</td><td>${ago}s ago</td></tr>`;
      }
      html += '</table>';
      el.innerHTML = html;
    }

    function renderDevices(devices, outputs) {
      const el = document.getElementById('deviceList');
      if (devices.length === 0) {
        el.innerHTML = '<div class="empty-state">No DeckLink devices detected. Install Blackmagic Desktop Video drivers.</div>';
        return;
      }

      const modes = deviceInfo ? deviceInfo.displayModes : {};
      let html = '<table><tr><th>Index</th><th>Name</th><th>Status</th><th>Mode</th><th>Frames</th><th>Actions</th></tr>';

      for (const dev of devices) {
        const output = outputs[dev.index];
        const isActive = !!output;
        const status = isActive ? '<span class="badge active">Active</span>' : '<span class="badge idle">Idle</span>';
        const frames = isActive ? output.framesSent.toLocaleString() : '-';
        const mode = isActive ? output.mode : '-';

        let actions = '';
        if (isActive) {
          actions = `<button class="btn danger" onclick="stopOutput(${dev.index})">Stop</button>`;
        } else if (dev.supportsOutput) {
          let modeSelect = '<select id="mode_' + dev.index + '">';
          for (const [k, v] of Object.entries(modes)) {
            const sel = k === '1080p2997' ? ' selected' : '';
            modeSelect += `<option value="${k}"${sel}>${v}</option>`;
          }
          modeSelect += '</select>';
          actions = `${modeSelect} <button class="btn" onclick="startOutput(${dev.index})">Start</button>`;
        } else {
          actions = '<span style="color:#64748b">No output</span>';
        }

        html += `<tr><td>${dev.index}</td><td>${dev.name}</td><td>${status}</td><td>${mode}</td><td>${frames}</td><td>${actions}</td></tr>`;
      }
      html += '</table>';
      el.innerHTML = html;
    }

    function renderParticipants(participants, dl) {
      const el = document.getElementById('participantList');
      const entries = Object.entries(participants);
      if (entries.length === 0) {
        el.innerHTML = '<div class="empty-state">No participants in meeting</div>';
        return;
      }

      const devices = dl.devices || [];
      const outputs = dl.outputs || {};
      const assignments = dl.assignments || {};

      let html = '<table><tr><th>ID</th><th>Name</th><th>Assigned To</th><th>Actions</th></tr>';
      for (const [uid, p] of entries) {
        const userId = parseInt(uid);
        const assignedDevice = assignments[userId];
        const assignedText = assignedDevice !== undefined ? `Device ${assignedDevice}` : '<span style="color:#64748b">Unassigned</span>';

        let actions = '<div class="assign-row">';
        const activeDevices = Object.entries(outputs).filter(([, o]) => o.active);
        if (activeDevices.length > 0) {
          actions += `<select id="assign_${userId}">`;
          actions += '<option value="-1">-- Select --</option>';
          for (const [idx] of activeDevices) {
            const dev = devices.find(d => d.index === parseInt(idx));
            const name = dev ? dev.name : `Device ${idx}`;
            const sel = assignedDevice === parseInt(idx) ? ' selected' : '';
            actions += `<option value="${idx}"${sel}>${name}</option>`;
          }
          actions += '</select>';
          actions += ` <button class="btn" onclick="assignUser(${userId})">Assign</button>`;
          if (assignedDevice !== undefined) {
            actions += ` <button class="btn danger" onclick="unassignUser(${userId})">Unassign</button>`;
          }
        } else {
          actions += '<span style="color:#64748b">No active outputs</span>';
        }
        actions += '</div>';

        html += `<tr><td>${userId}</td><td>${p.name || 'Unknown'}</td><td>${assignedText}</td><td>${actions}</td></tr>`;
      }
      html += '</table>';
      el.innerHTML = html;
    }

    async function startOutput(deviceIndex) {
      const modeEl = document.getElementById('mode_' + deviceIndex);
      const mode = modeEl ? modeEl.value : '1080p2997';
      try {
        await fetch('/api/output/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deviceIndex, mode }),
        });
        fetchStatus();
      } catch (err) {
        alert('Failed to start output: ' + err.message);
      }
    }

    async function stopOutput(deviceIndex) {
      try {
        await fetch('/api/output/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deviceIndex }),
        });
        fetchStatus();
      } catch (err) {
        alert('Failed to stop output: ' + err.message);
      }
    }

    async function assignUser(userId) {
      const selectEl = document.getElementById('assign_' + userId);
      if (!selectEl) return;
      const deviceIndex = parseInt(selectEl.value);
      if (deviceIndex < 0) return;
      try {
        await fetch('/api/assign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, deviceIndex }),
        });
        fetchStatus();
      } catch (err) {
        alert('Failed to assign: ' + err.message);
      }
    }

    async function unassignUser(userId) {
      try {
        await fetch('/api/unassign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId }),
        });
        fetchStatus();
      } catch (err) {
        alert('Failed to unassign: ' + err.message);
      }
    }

    fetchDevices();
    fetchStatus();
    setInterval(fetchStatus, 2000);
    setInterval(fetchDevices, 30000);
  </script>
</body>
</html>
